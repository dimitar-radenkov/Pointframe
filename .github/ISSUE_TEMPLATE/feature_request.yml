name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion! Before submitting, please check [planned features](https://github.com/dimitar-radenkov/Pointframe/blob/master/docs/planned-features.md) to see if it's already on the roadmap.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or frustration this feature would address.
      placeholder: "When I try to share a screenshot, I have to... It would be easier if..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like the feature to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other tools or workarounds you've tried?
