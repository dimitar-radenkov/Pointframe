name: Winget Release

# Submits a new package version to microsoft/winget-pkgs only when
# version.json is changed (i.e. a minor or major version bump).
# Patch releases (commit-height increments) are intentionally excluded.

on:
  workflow_run:
    workflows: ["CD"]
    types: [completed]
    branches:
      - master
  workflow_dispatch:
    inputs:
      force_submit:
        description: Force winget submission even when version.json did not change
        required: true
        default: true
        type: boolean
      version:
        description: Package version to submit. Leave blank to use the current Nerdbank.GitVersioning version.
        required: false
        type: string
      release_tag:
        description: Release tag to submit. Leave blank to use v<version>.
        required: false
        type: string

jobs:
  submit:
    runs-on: windows-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if version.json changed
        id: check
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $manualVersion = "${{ inputs.version }}"
            $manualTag = "${{ inputs.release_tag }}"
            $forceSubmit = "${{ inputs.force_submit }}" -eq "true"

            $changed = $forceSubmit -or -not [string]::IsNullOrWhiteSpace($manualVersion) -or -not [string]::IsNullOrWhiteSpace($manualTag)
          }
          else {
            $changed = git diff HEAD~1 HEAD --name-only | Where-Object { $_ -eq "version.json" }
          }

          $result = if ($changed) { "true" } else { "false" }
          "changed=$result" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Restore tools
        if: steps.check.outputs.changed == 'true'
        run: dotnet tool restore

      - name: Get version
        id: version
        if: steps.check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $display = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($display)) {
            $json = dotnet nbgv get-version --format json | ConvertFrom-Json
            $display = $json.NuGetPackageVersion
          }

          $tag = "${{ inputs.release_tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "v$display"
          }

          "display=$display" | Out-File -Append $env:GITHUB_OUTPUT
          "tag=$tag" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Submit to winget
        if: steps.check.outputs.changed == 'true'
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: DimitarRadenkov.SnippingTool
          version: ${{ steps.version.outputs.display }}
          release-tag: ${{ steps.version.outputs.tag }}
          installers-regex: 'Setup\.exe$'
          fork-user: dimitar-radenkov
          token: ${{ secrets.WINGET_TOKEN }}
